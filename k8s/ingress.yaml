apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citizen-portal-ingress
  namespace: citizen-portal
spec:
  ingressClassName: nginx

  rules:
  - host: citizen.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80

  - host: api.citizen.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 5000


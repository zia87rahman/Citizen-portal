services:
  postgres:
    image: postgres:15
    container_name: desc-postgres
    environment:
      POSTGRES_DB: citizen_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: desc-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: desc-backend
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: citizen_portal
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: desc_super_secret_key
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: desc-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:

name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/desc-backend:latest ./backend

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/desc-frontend:latest ./frontend

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/desc-backend:latest

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/desc-frontend:latest